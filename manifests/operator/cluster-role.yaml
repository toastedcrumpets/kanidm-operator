apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kanidm-operator-role-cluster
rules:
  # Framework: runtime observation of namespaces & CRDs (addition/deletion).
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [list, watch]
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [list, watch]

  # Framework: admission webhook configuration management.
  - apiGroups: [admissionregistration.k8s.io/v1, admissionregistration.k8s.io/v1beta1]
    resources: [validatingwebhookconfigurations, mutatingwebhookconfigurations]
    verbs: [create, patch]

  # Framework: kopf progress events in any watched namespace.
  - apiGroups: [""]
    resources: [events]
    verbs: [create]

  # Application: watching & patching custom resources.
  - apiGroups: [kanidm.github.io]
    resources: [groups, oauth2-clients, kanidms, users]
    verbs: [list, watch, patch]

  # Application: other resources the operator creates and manages.
  - apiGroups: [batch, extensions]
    resources: [cronjobs]
    verbs: [create, delete]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [create, delete, patch]
  - apiGroups: [""]
    resources: [persistentvolumeclaims, secrets, services, configmaps]
    verbs: [create, delete, get, list, update, patch]
  - apiGroups: [""]
    resources: [pods, pods/exec]
    verbs: [get, list, watch, exec]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses]
    verbs: [create, delete, get, list, update, patch]
  - apiGroups: [cert-manager.io]
    resources: [certificates]
    verbs: [list, watch, patch, get, create]
