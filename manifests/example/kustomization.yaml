---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - kanidm.yaml
  - users.yaml
  - groups.yaml
  - oauth2-client.yaml
  # Optional: oauth2-client-grafana.yaml (requires grafana_* groups to exist first)

# Patch domain/origin URLs to match your environment.
patches:
  - target:
      kind: Kanidm
      name: kanidm-instance
    patch: |-
      - op: replace
        path: /spec/domain
        value: idm.example.com
  - target:
      kind: OAuth2Client
      name: forgejo-oauth
    patch: |-
      - op: replace
        path: /spec/origin
        value: https://git.example.com
      - op: replace
        path: /spec/callback-url
        value: https://git.example.com/user/oauth2/callback
